# Used by `cross` for non-macOS targets from macOS/Linux hosts.
# https://github.com/cross-rs/cross

[target.x86_64-unknown-linux-gnu]
# libasound2: cpal; libssl-dev: openssl-sys (native-tls / reqwest / hf-hub).
# PipeWire headers are not available on cross's Ubuntu 20.04 image; Linux cross-builds use
# `--no-default-features`, which omits default `linux-system-audio` / `pipewire`, `metal`, and `diarize`.
pre-build = [
    "apt-get update && apt-get install --yes --no-install-recommends libasound2-dev libssl-dev pkg-config",
]
